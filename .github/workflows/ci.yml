name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    name: Backend Pytest
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        
    - name: Run Pytest
      run: |
        cd backend
        PYTHONPATH="." pytest tests/

  frontend-tests:
    name: Frontend E2E
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Build Next.js
      run: |
        cd frontend
        npm run build
        
    - name: Install Playwright Browsers
      run: |
        cd frontend
        npx playwright install --with-deps
        
    - name: Run Playwright Tests
      run: |
        cd frontend
        npx playwright test
